<!DOCTYPE html>
<html lang="en">
<!----------HEAD------------->
<head>
  <title>Sandbox</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <link rel="icon" type="image/x-icon" href="media/KatIcon.ico">
  <script>
    (function () {
      const theme = document.cookie.split('; ').find(row => row.startsWith('theme='))?.split('=')[1];
      if (theme === 'dark') {document.write('<link rel="stylesheet" href="css/glowy.css">');} 
      else {document.write('<link rel="stylesheet" href="css/neo.css">');}
    })();
  </script>
  <link id="styleLink" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<!-----------BODY----------->
<body>
  <header></header>
  <main>
    <div class="contentGrid">
        <iframe src="index.html" width="100%" height="500px"></iframe>
    </div>
  </main>
  <footer></footer>
</body>
  <script type="module" src="javascript/index.js"></script>
</html>
