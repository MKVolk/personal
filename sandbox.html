<!DOCTYPE html>
<html lang="en">
<!----------HEAD------------->
<head>
  <title>Sandbox</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <link rel="icon" type="image/x-icon" href="media/KatIcon.ico">
  <script>
    (function () {
      const theme = document.cookie.split('; ').find(row => row.startsWith('theme='))?.split('=')[1];
      if (theme === 'dark') {document.write('<link rel="stylesheet" href="css/glowy.css">');} 
      else {document.write('<link rel="stylesheet" href="css/neo.css">');}
    })();
  </script>
  <link id="styleLink" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<!-----------BODY----------->
<body>
  <header></header>
  <main>
    <div class="contentFlex">
      <model-viewer alt="Neil Armstrong's Spacesuit from the Smithsonian Digitization Programs Office and National Air and Space Museum" src="shared-assets/models/NeilArmstrong.glb" ar environment-image="shared-assets/environments/moon_1k.hdr" poster="shared-assets/models/NeilArmstrong.webp" shadow-intensity="1" camera-controls touch-action="pan-y"></model-viewer>
    </div>
    <div class="contentGrid">
        <iframe src="index.html" width="100%" height="500px"></iframe>
    </div>
  </main>
  <footer></footer>
</body>
  <script type="module" src="javascript/index.js"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
</html>
